<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quitly Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --bg:#f5f5f0; --surface:#fff; --border:#e0e0e0; --text:#0a0a0a; --sub:#666; --green:#1a9e6b; --red:#d93025; --r:10px; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Manrope',system-ui,sans-serif; background:var(--bg); color:var(--text); font-size:14px; padding:16px; }
h1 { font-size:22px; font-weight:800; margin-bottom:4px; }
h2 { font-size:16px; font-weight:800; margin:24px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.login-wrap { max-width:320px; margin:80px auto; text-align:center; }
.login-wrap input { width:100%; padding:12px; border:1.5px solid var(--border); border-radius:var(--r); font-size:16px; font-family:inherit; margin:12px 0; }
.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:10px 18px; border:none; border-radius:var(--r); font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; }
.btn:active { opacity:.7; }
.btn-primary { background:var(--text); color:#fff; }
.btn-red { background:var(--red); color:#fff; }
.btn-green { background:var(--green); color:#fff; }
.btn-ghost { background:var(--surface); border:1px solid var(--border); color:var(--text); }
.btn-sm { padding:6px 12px; font-size:12px; }
table { width:100%; border-collapse:collapse; background:var(--surface); border-radius:var(--r); overflow:hidden; border:1px solid var(--border); }
th { text-align:left; padding:10px 12px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--sub); background:var(--bg); border-bottom:1px solid var(--border); }
td { padding:8px 12px; border-bottom:1px solid var(--border); font-size:13px; vertical-align:middle; }
tr:last-child td { border-bottom:none; }
.badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; }
.badge-green { background:#edf7f3; color:var(--green); }
.badge-red { background:#fdecea; color:var(--red); }
.tabs { display:flex; gap:8px; margin-bottom:16px; }
.tab { padding:8px 16px; border-radius:20px; border:1.5px solid var(--border); background:none; font-family:inherit; font-size:13px; font-weight:700; color:var(--sub); cursor:pointer; }
.tab.on { background:var(--text); border-color:var(--text); color:#fff; }
.stat-row { display:flex; gap:12px; margin-bottom:16px; }
.stat-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:12px 16px; flex:1; }
.stat-val { font-size:20px; font-weight:800; }
.stat-lbl { font-size:11px; color:var(--sub); }
#admin { display:none; }
.toast { position:fixed; top:12px; left:50%; transform:translateX(-50%); background:var(--text); color:#fff; padding:10px 20px; border-radius:20px; font-size:13px; font-weight:600; z-index:99; animation:fadeIn .2s ease, fadeOut .2s ease 2s forwards; }
@keyframes fadeIn { from{opacity:0;transform:translateX(-50%) translateY(-8px)} to{opacity:1;transform:translateX(-50%)} }
@keyframes fadeOut { to{opacity:0;transform:translateX(-50%) translateY(-8px)} }
.empty { text-align:center; color:var(--sub); padding:24px; }
</style>
</head>
<body>

<div id="login" class="login-wrap">
  <div style="font-size:40px;margin-bottom:12px">&#x1f512;</div>
  <h1>Quitly Admin</h1>
  <p style="color:var(--sub);margin-bottom:16px">Панель управления</p>
  <input type="password" id="pwd" placeholder="Пароль" onkeydown="if(event.key==='Enter')tryLogin()">
  <button class="btn btn-primary" style="width:100%" onclick="tryLogin()">Войти</button>
</div>

<div id="admin">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <h1>Quitly Admin</h1>
    <button class="btn btn-ghost btn-sm" onclick="location.reload()">Обновить</button>
  </div>
  <div class="stat-row" id="stats"></div>

  <div class="tabs">
    <button class="tab on" onclick="switchTab('users',this)">Пользователи</button>
    <button class="tab" onclick="switchTab('messages',this)">Сообщения</button>
    <button class="tab" onclick="switchTab('scheduled',this)">Рассылка</button>
  </div>

  <div id="panel-users"></div>
  <div id="panel-messages" style="display:none"></div>
  <div id="panel-scheduled" style="display:none"></div>
</div>

<script>
const SB_URL = 'https://xyvysloysykfaarupial.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnlzbG95c3lrZmFhcnVwaWFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NzMxNjMsImV4cCI6MjA4ODU0OTE2M30.cFljP8F8zkvYqwZDHQnoRdny-YrgSH6EBnLM40QrFJk';
const HDR = { 'Content-Type':'application/json', 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY };
const ADMIN_PASS = 'quitly2024admin';

function toast(msg) {
  var t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2500);
}

function tryLogin() {
  if (document.getElementById('pwd').value === ADMIN_PASS) {
    localStorage.setItem('ql_admin', '1');
    showAdmin();
  } else {
    toast('Неверный пароль');
  }
}

function showAdmin() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('admin').style.display = 'block';
  loadAll();
}

if (localStorage.getItem('ql_admin') === '1') showAdmin();

async function sbGet(path) {
  var r = await fetch(SB_URL+'/rest/v1/'+path, { headers:HDR });
  return r.ok ? r.json() : [];
}

async function sbDelete(table, filter) {
  var r = await fetch(SB_URL+'/rest/v1/'+table+'?'+filter, { method:'DELETE', headers:HDR });
  return r.ok;
}

async function sbPatch(table, filter, data) {
  var r = await fetch(SB_URL+'/rest/v1/'+table+'?'+filter, {
    method:'PATCH', headers:{...HDR, 'Prefer':'return=minimal'}, body:JSON.stringify(data)
  });
  return r.ok;
}

var _users = [], _messages = [], _scheduled = [];

async function loadAll() {
  [_users, _messages, _scheduled] = await Promise.all([
    sbGet('quit_sessions?select=*&order=last_seen.desc'),
    sbGet('support_messages?select=*&order=created_at.desc&limit=100'),
    sbGet('scheduled_messages?select=*&order=send_at.asc&limit=200').catch(function(){ return []; })
  ]);
  renderStats();
  renderUsers();
  renderMessages();
  renderScheduled();
}

function renderStats() {
  var active = _users.filter(function(u){ return u.is_active; }).length;
  var banned = _users.filter(function(u){ return u.is_banned; }).length;
  document.getElementById('stats').innerHTML =
    '<div class="stat-box"><div class="stat-val">'+_users.length+'</div><div class="stat-lbl">Всего</div></div>' +
    '<div class="stat-box"><div class="stat-val" style="color:var(--green)">'+active+'</div><div class="stat-lbl">Активных</div></div>' +
    '<div class="stat-box"><div class="stat-val" style="color:var(--red)">'+banned+'</div><div class="stat-lbl">Забанено</div></div>' +
    '<div class="stat-box"><div class="stat-val">'+_messages.length+'</div><div class="stat-lbl">Сообщений</div></div>';
}

function renderUsers() {
  var el = document.getElementById('panel-users');
  if (!_users.length) { el.innerHTML = '<div class="empty">Нет пользователей</div>'; return; }
  el.innerHTML = '<table><thead><tr><th>Имя</th><th>TG</th><th>Статус</th><th>Последний визит</th><th></th></tr></thead><tbody>' +
    _users.map(function(u){
      var banned = u.is_banned;
      var lastSeen = u.last_seen ? new Date(u.last_seen).toLocaleString('ru') : '—';
      return '<tr>' +
        '<td><strong>'+escHtml(u.display_name||'—')+'</strong></td>' +
        '<td style="color:var(--sub)">'+escHtml(u.tg_handle||u.tg_id||'—')+'</td>' +
        '<td>'+(banned ? '<span class="badge badge-red">Бан</span>' : u.is_active ? '<span class="badge badge-green">Актив</span>' : '<span class="badge" style="background:#eee;color:#999">Неактив</span>')+'</td>' +
        '<td style="color:var(--sub);font-size:12px">'+lastSeen+'</td>' +
        '<td style="text-align:right">' +
          (banned
            ? '<button class="btn btn-green btn-sm" onclick="unbanUser(\''+u.tg_id+'\')">Разбанить</button>'
            : '<button class="btn btn-red btn-sm" onclick="banUser(\''+u.tg_id+'\')">Забанить</button>') +
          ' <button class="btn btn-ghost btn-sm" onclick="deactivateUser(\''+u.tg_id+'\')">Деактив</button>' +
        '</td></tr>';
    }).join('') + '</tbody></table>';
}

function renderMessages() {
  var el = document.getElementById('panel-messages');
  if (!_messages.length) { el.innerHTML = '<div class="empty">Нет сообщений</div>'; return; }
  el.innerHTML = '<table><thead><tr><th>От</th><th>Кому</th><th>Сообщение</th><th>Дата</th><th></th></tr></thead><tbody>' +
    _messages.map(function(m){
      var date = m.created_at ? new Date(m.created_at).toLocaleString('ru') : '—';
      return '<tr>' +
        '<td>'+escHtml(m.from_name||'—')+'</td>' +
        '<td>'+escHtml(m.to_name||'—')+'</td>' +
        '<td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escHtml(m.message||'')+'</td>' +
        '<td style="color:var(--sub);font-size:12px">'+date+'</td>' +
        '<td><button class="btn btn-red btn-sm" onclick="deleteMsg(\''+m.id+'\')">Удалить</button></td>' +
      '</tr>';
    }).join('') + '</tbody></table>';
}

function renderScheduled() {
  var el = document.getElementById('panel-scheduled');
  if (!_scheduled.length) { el.innerHTML = '<div class="empty">Нет запланированных сообщений.<br><br><span style="font-size:12px;color:var(--sub)">Таблица scheduled_messages будет заполняться автоматически при регистрации пользователей через бота.</span></div>'; return; }
  el.innerHTML = '<table><thead><tr><th>Chat ID</th><th>Тип</th><th>Отправка</th><th>Статус</th></tr></thead><tbody>' +
    _scheduled.map(function(s){
      var date = s.send_at ? new Date(s.send_at).toLocaleString('ru') : '—';
      return '<tr>' +
        '<td>'+escHtml(String(s.chat_id||''))+'</td>' +
        '<td>'+escHtml(s.message_type||'—')+'</td>' +
        '<td style="color:var(--sub);font-size:12px">'+date+'</td>' +
        '<td>'+(s.sent ? '<span class="badge badge-green">Отправлено</span>' : '<span class="badge" style="background:#fff8e1;color:#b85c00">Ожидает</span>')+'</td>' +
      '</tr>';
    }).join('') + '</tbody></table>';
}

async function banUser(tgId) {
  if (!confirm('Забанить пользователя? Он не будет отображаться в ленте.')) return;
  var ok = await sbPatch('quit_sessions', 'tg_id=eq.'+tgId, { is_banned:true });
  toast(ok ? 'Забанен' : 'Ошибка (колонка is_banned может отсутствовать в БД)');
  loadAll();
}

async function unbanUser(tgId) {
  var ok = await sbPatch('quit_sessions', 'tg_id=eq.'+tgId, { is_banned:false });
  toast(ok ? 'Разбанен' : 'Ошибка');
  loadAll();
}

async function deactivateUser(tgId) {
  if (!confirm('Деактивировать сессию пользователя?')) return;
  var ok = await sbPatch('quit_sessions', 'tg_id=eq.'+tgId, { is_active:false });
  toast(ok ? 'Деактивирован' : 'Ошибка');
  loadAll();
}

async function deleteMsg(id) {
  if (!confirm('Удалить сообщение?')) return;
  var ok = await sbDelete('support_messages', 'id=eq.'+id);
  toast(ok ? 'Удалено' : 'Ошибка');
  loadAll();
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('on'); });
  btn.classList.add('on');
  ['users','messages','scheduled'].forEach(function(n){
    document.getElementById('panel-'+n).style.display = n===name ? 'block' : 'none';
  });
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
